name: MacroMonsters
options:
  bundleIdPrefix: com.sxxie
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  MacroMonstersCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/MacroMonstersCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sxxie.MacroMonstersCore
        GENERATE_INFOPLIST_FILE: YES

  MacroMonsters:
    type: application
    platform: iOS
    sources:
      - path: Sources/MacroMonstersApp
    dependencies:
      - target: MacroMonstersCore
      - target: MacroMonstersWidgets
        embed: true
    entitlements:
      path: Sources/MacroMonstersApp/Supporting/MacroMonsters.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sxxie.macromonsters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sxxie.MacroMonsters
        INFOPLIST_FILE: Sources/MacroMonstersApp/Supporting/Info.plist

  MacroMonstersWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/MacroMonstersWidgets
    dependencies:
      - target: MacroMonstersCore
    entitlements:
      path: Sources/MacroMonstersWidgets/MacroMonstersWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sxxie.macromonsters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sxxie.MacroMonsters.widgets
        INFOPLIST_FILE: Sources/MacroMonstersWidgets/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES

  MacroMonstersCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/MacroMonstersCoreTests
    dependencies:
      - target: MacroMonstersCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sxxie.MacroMonstersCoreTests
        GENERATE_INFOPLIST_FILE: YES

  MacroMonstersUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/MacroMonstersUITests
    dependencies:
      - target: MacroMonsters
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sxxie.MacroMonstersUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MacroMonsters:
    build:
      targets:
        MacroMonsters: all
    test:
      targets:
        - MacroMonstersUITests
      gatherCoverageData: true
  MacroMonstersCore:
    build:
      targets:
        MacroMonstersCore: all
        MacroMonstersCoreTests: [test]
    test:
      targets:
        - MacroMonstersCoreTests
      gatherCoverageData: true
